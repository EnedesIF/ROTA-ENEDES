<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consultoria Express 4D — ENEDES Rota Empreendedora</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--green:#2d6a4f;--green2:#40916c;--gl:#74c69d;--gbg:#f0f9f4;--navy:#1d3557;--navy2:#2d4a8a;--amber:#e07a5f;--abg:#fef8f5;--purple:#7b2d8b;--blue:#457b9d;--bg:#f0f4f8;--card:#fff;--border:#dde3ec;--text:#1a2035;--muted:#6b7c93;--soft:#f8fafd;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);padding:0 24px;box-shadow:0 2px 20px rgba(0,0,0,.25);}
.hi{max-width:900px;margin:0 auto;padding:20px 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.htag{color:var(--gl);font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px;}
.htitle{color:#fff;font-family:'DM Serif Display',serif;font-size:24px;}
.hsub{color:#a8b8d8;font-size:12px;margin-top:3px;}
.hbtns{display:flex;gap:8px;}
.bp{padding:9px 18px;border-radius:8px;border:none;background:var(--green);color:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;transition:all .2s;}
.bp:hover{background:#1f4d38;}
.bo{padding:9px 18px;border-radius:8px;border:1.5px solid rgba(255,255,255,.25);background:transparent;color:#fff;cursor:pointer;font-family:inherit;font-size:13px;}
.bcnt{background:var(--amber);color:#fff;border-radius:10px;font-size:11px;padding:1px 7px;margin-left:4px;}
.main{max-width:900px;margin:0 auto;padding:28px 16px;}
/* PHASES */
.phases{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:24px;}
.ph{border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .3s;border:2px solid transparent;}
.ph.active{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.13);}
.ph-icon{font-size:22px;margin-bottom:5px;}
.ph-num{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;}
.ph-name{font-size:12px;font-weight:700;}
.ph-dur{font-size:10px;margin-top:2px;opacity:.7;}
.ph0{background:#e8f4f0;color:var(--green);} .ph0.active{background:var(--green);color:#fff;}
.ph1{background:#e8edf8;color:var(--navy);} .ph1.active{background:var(--navy);color:#fff;}
.ph2{background:#f3e8f8;color:var(--purple);} .ph2.active{background:var(--purple);color:#fff;}
.ph3{background:#fdecea;color:var(--amber);} .ph3.active{background:var(--amber);color:#fff;}
/* CARD */
.card{background:var(--card);border-radius:16px;padding:28px;border:1px solid var(--border);box-shadow:0 2px 20px rgba(0,0,0,.05);margin-bottom:20px;animation:fi .3s ease;}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.ph-hdr{display:flex;align-items:flex-start;gap:16px;margin-bottom:22px;padding-bottom:18px;border-bottom:2px solid var(--bg);}
.ph-ico{width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.ph-lbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;}
.ph-ttl{font-family:'DM Serif Display',serif;font-size:21px;margin-bottom:3px;}
.ph-obj{font-size:13px;color:var(--muted);line-height:1.5;}
.ph-dur2{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:5px;}
/* FIELDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.full{grid-column:1/-1;}
.fg{margin-bottom:15px;}
.lbl{display:block;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
input[type=text],input[type=date],select,textarea{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:inherit;background:var(--soft);color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;}
input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(45,106,79,.1);}
select{appearance:none;cursor:pointer;}
textarea{resize:vertical;line-height:1.6;}
.rg,.cg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px;}
.ri,.ci{display:flex;align-items:center;gap:10px;cursor:pointer;padding:9px 12px;border-radius:8px;font-size:14px;color:var(--text);background:var(--soft);border:1.5px solid var(--border);transition:all .2s;}
.ri:hover,.ci:hover{border-color:var(--green);background:var(--gbg);}
.ri input,.ci input{width:16px;height:16px;accent-color:var(--green);cursor:pointer;flex-shrink:0;}
/* PILARES */
.pg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px;}
.pilar{background:var(--soft);border:1.5px solid var(--border);border-radius:12px;padding:14px;}
.pilar-n{font-weight:700;font-size:13px;color:var(--navy);margin-bottom:8px;}
.stars{display:flex;gap:5px;margin-bottom:8px;}
.star{width:32px;height:32px;border-radius:6px;border:1.5px solid var(--border);cursor:pointer;font-weight:700;font-size:13px;font-family:inherit;background:#fff;color:var(--muted);transition:all .15s;}
.star.on{background:var(--purple);border-color:var(--purple);color:#fff;}
.cls{display:flex;gap:4px;margin-bottom:8px;}
.clb{flex:1;padding:5px 2px;border-radius:6px;border:1.5px solid var(--border);cursor:pointer;font-size:9px;font-weight:700;font-family:inherit;background:#fff;color:var(--muted);transition:all .15s;text-align:center;}
.cu.on{background:#e53e3e;border-color:#e53e3e;color:#fff;}
.ci2.on{background:#dd6b20;border-color:#dd6b20;color:#fff;}
.ce.on{background:var(--green);border-color:var(--green);color:#fff;}
.pobs{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-family:inherit;background:#fff;color:var(--text);outline:none;resize:vertical;}
/* GUT */
.gut{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px;}
.gut-i{background:var(--soft);border:1.5px solid var(--border);border-radius:10px;padding:12px;}
.gut-l{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.gut-d{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.4;}
.gut-s{display:flex;gap:4px;}
.gs{width:28px;height:28px;border-radius:5px;border:1.5px solid var(--border);cursor:pointer;font-weight:700;font-size:12px;font-family:inherit;background:#fff;color:var(--muted);transition:all .15s;}
.gs.on{background:var(--navy);border-color:var(--navy);color:#fff;}
.gut-t{background:#e8edf8;border:1.5px solid var(--navy);border-radius:10px;padding:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.gut-tv{font-family:'DM Serif Display',serif;font-size:32px;color:var(--navy);}
.gut-tl{font-size:11px;color:var(--navy);font-weight:700;opacity:.7;}
/* AÇÕES */
.ac{background:var(--abg);border:1.5px solid #f0d5c8;border-radius:12px;padding:16px;margin-bottom:10px;}
.ac-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.ac-l{font-size:11px;font-weight:700;color:var(--amber);letter-spacing:1.5px;text-transform:uppercase;}
.ac-r{background:none;border:none;color:#a0aec0;cursor:pointer;font-size:18px;padding:0;line-height:1;}
.ac-g{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ac-f{grid-column:1/-1;}
.afl{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.ai{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;background:#fff;color:var(--text);outline:none;}
.ai:focus{border-color:var(--amber);}
.add-ac{width:100%;padding:11px;border:1.5px dashed var(--green);border-radius:9px;background:transparent;color:var(--green);cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;transition:background .2s;}
.add-ac:hover{background:var(--gbg);}
/* NPS */
.nps-r{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.nb{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;font-weight:700;font-size:13px;font-family:inherit;background:var(--soft);color:var(--muted);transition:all .15s;}
.nb.on{background:var(--green);border-color:var(--green);color:#fff;}
.nps-lb{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px;}
/* NAV */
.nav{display:flex;justify-content:space-between;align-items:center;}
.bk{padding:10px 24px;border-radius:9px;border:1.5px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;font-family:inherit;font-size:14px;}
.bk:hover{background:var(--bg);}
.bn{padding:10px 28px;border-radius:9px;border:none;color:#fff;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;transition:all .2s;}
.bn:hover{opacity:.9;}
.bs{padding:11px 32px;border-radius:9px;border:none;background:var(--green);color:#fff;cursor:pointer;font-family:inherit;font-size:15px;font-weight:700;}
.bs.ok{background:#27ae60;}
.prog{display:flex;gap:6px;margin-top:16px;}
.pb{height:4px;flex:1;border-radius:4px;background:var(--border);transition:background .3s;}
/* ALERTS */
.aerr{margin-top:12px;color:#e53e3e;font-size:13px;background:#fff5f5;border:1px solid #fed7d7;border-radius:8px;padding:10px 14px;}
.aok{margin-top:12px;color:var(--green);font-size:13px;background:var(--gbg);border:1px solid #b7e4c7;border-radius:8px;padding:10px 14px;}
.ainfo{background:#fffbea;border:1px solid #f6e05e;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#744210;}
.apos{background:var(--gbg);border:1px solid #b7e4c7;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--green);}
.tip{font-size:12px;color:var(--muted);background:var(--soft);border:1px solid var(--border);border-radius:8px;padding:9px 13px;margin-bottom:14px;line-height:1.5;}
.tip strong{color:var(--text);}
.sep{border-top:2px solid var(--bg);margin:20px 0 16px;}
/* LIST */
.lh{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.lt{font-family:'DM Serif Display',serif;font-size:24px;color:var(--navy);}
.sts{display:flex;gap:10px;flex-wrap:wrap;}
.st{background:#fff;border:1px solid var(--border);border-radius:10px;padding:8px 14px;text-align:center;}
.stv{font-family:'DM Serif Display',serif;font-size:22px;color:var(--navy);}
.stl{font-size:11px;color:var(--muted);font-weight:600;}
.empty{background:#fff;border-radius:16px;padding:56px;text-align:center;border:1px solid var(--border);}
.rec{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px 20px;cursor:pointer;margin-bottom:10px;transition:all .2s;}
.rec:hover{box-shadow:0 6px 24px rgba(45,106,79,.12);transform:translateY(-2px);}
.rec-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.rec-nm{font-weight:700;font-size:16px;margin-bottom:2px;}
.rec-sb{font-size:13px;color:var(--muted);}
.rec-tg{display:flex;gap:6px;flex-wrap:wrap;}
.tg{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.tgg{background:var(--gbg);color:var(--green);}
.tgn{background:#e8edf8;color:var(--navy);}
.tgp{background:#f3e8f8;color:var(--purple);}
.rec-mt{font-size:12px;color:#a0aec0;margin-top:6px;}
/* DETAIL */
.db{background:none;border:none;color:var(--green);cursor:pointer;font-family:inherit;font-size:14px;margin-bottom:16px;padding:0;font-weight:700;}
.dn{font-family:'DM Serif Display',serif;font-size:26px;margin-bottom:4px;}
.dm{color:var(--muted);font-size:13px;margin-bottom:24px;}
.ds{margin-bottom:22px;}
.dst{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:8px 14px;border-radius:8px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.dr{margin-bottom:10px;}
.dl{font-size:11px;color:#a0aec0;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;}
.dv{font-size:14px;color:var(--text);line-height:1.6;}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.pd{background:var(--soft);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.pdn{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px;}
.pdv{font-family:'DM Serif Display',serif;font-size:24px;color:var(--purple);}
.sg{background:var(--gbg);color:var(--green);}
.sn{background:#e8edf8;color:var(--navy);}
.sp{background:#f3e8f8;color:var(--purple);}
.sa{background:var(--abg);color:var(--amber);}
@media(max-width:640px){
  .g2,.rg,.cg,.pg,.gut,.ac-g,.dg{grid-template-columns:1fr;}
  .full,.ac-f{grid-column:auto;}
  .phases{grid-template-columns:1fr 1fr;}
}
</style>
</head>

  ["list","form","detail"].forEach(x=>document.getElementById("s-"+x).style.display="none");
  document.getElementById("s-"+s).style.display="block";
  lr(); document.getElementById("badge").textContent=recs.length;
  if(s==="list") renderList();
  if(s==="form"){F=nf();cp=0;renderForm();}
  if(s==="detail") renderDetail();
  window.scrollTo(0,0);
}

function renderList(){
  const el=document.getElementById("s-list");
  const n=recs.length;
  const np=recs.filter(r=>r.nps).map(r=>+r.nps);
  const avg=np.length?(np.reduce((a,b)=>a+b,0)/np.length).toFixed(1):"—";
  el.innerHTML=`
    <div class="lh"><div class="lt">Atendimentos Registrados</div>
      <div class="sts">
        <div class="st"><div class="stv">${n}</div><div class="stl">Total</div></div>
        <div class="st"><div class="stv">${avg}</div><div class="stl">NPS Médio</div></div>

    ${n===0?`<div class="empty"><div style="font-size:48px;margin-bottom:12px">🚀</div><div style="font-size:16px;font-weight:600;color:#6b7c93">Nenhum atendimento ainda</div><div style="font-size:13px;margin-top:6px;color:#a0aec0">Clique em "+ Novo Atendimento" para começar.</div></div>`

      const pa=ns.length?(ns.reduce((a,b)=>a+b,0)/ns.length).toFixed(1):null;
      return `<div class="rec" onclick="openD(${i})">
        <div class="rec-top">
          <div><div class="rec-nm">${e(r.nome)||"—"}</div><div class="rec-sb">${[r.negocio,r.seg].filter(Boolean).join(" · ")}</div></div>

            ${r.nps?`<span class="tg tgn">NPS ${r.nps}</span>`:""}
            <span class="tg tgg">${r.data||r.sv?.split(",")[0]||""}</span>
          </div>
        </div>
        <div class="rec-mt">Mentor: ${r.mentor||"—"} · ${r.area||""} · Campus ${r.campus||"—"} · ${r.fmt||""}</div>

function openD(i){sel=recs[i];go("detail");}

        </div>
      `)}

        ${gt?row("Matriz GUT",`G(${gut.G}) × U(${gut.U}) × T(${gut.T}) = <strong>${gt}</strong>`):""}

function bindP(){
  const b=(id,fn)=>{const el=document.getElementById(id);if(el)el.addEventListener("input",ev=>fn(ev.target.value));};
  if(cp===0){
    b("f0",v=>F.nome=v);b("f1",v=>F.negocio=v);b("f2",v=>F.cnpj=v);b("f3",v=>F.seg=v);
    b("f4",v=>F.data=v);b("f5",v=>F.mentor=v);b("f7",v=>F.area=v);b("f8",v=>F.campus=v);b("f6",v=>F.desaOutro=v);
    q("[name=fmt]").forEach(r=>r.addEventListener("change",ev=>F.fmt=ev.target.value));
    q("[name=est]").forEach(r=>r.addEventListener("change",ev=>F.est=ev.target.value));
    q(".dc").forEach(c=>c.addEventListener("change",ev=>{
      if(ev.target.checked){if(!F.desa.includes(ev.target.value))F.desa.push(ev.target.value);}
      else F.desa=F.desa.filter(d=>d!==ev.target.value);
    }));
    PILS.forEach(p=>{const o=document.getElementById(`po-${p.k.replace(/\//g,"-")}`);if(o)o.addEventListener("input",ev=>F.pils[p.k].o=ev.target.value);});
  }
  if(cp===1){
    b("g0",v=>F.prob=v);b("g1",v=>F.causa=v);b("g2",v=>F.cincoP=v);
    b("g3",v=>F.meta=v);b("g4",v=>F.kpi=v);b("g5",v=>F.prazo=v);
  }
  if(cp===2){
    bAc();
    q(".cc").forEach(c=>c.addEventListener("change",ev=>{
      if(ev.target.checked){if(!F.comps.includes(ev.target.value))F.comps.push(ev.target.value);}
      else F.comps=F.comps.filter(x=>x!==ev.target.value);
    }));
    b("p2o",v=>F.obs=v);
  }
  if(cp===3){
    b("p0",v=>F.retorno=v);b("p1",v=>F.impl=v);b("p2",v=>F.func=v);
    b("p3",v=>F.ajus=v);b("p4",v=>F.prox=v);b("p5",v=>F.cnps=v);
  }
}

function bAc(){
  F.acoes.forEach((_,i)=>{
    const b=(id,key)=>{const el=document.getElementById(id);if(el)el.addEventListener("input",ev=>F.acoes[i][key]=ev.target.value);};
    b(`a${i}a`,"a");b(`a${i}c`,"c");b(`a${i}q`,"q");b(`a${i}r`,"r");b(`a${i}i`,"ind");
  });
}

function cAc(){
  F.acoes.forEach((_,i)=>{
    const g=id=>{const el=document.getElementById(id);return el?el.value:"";};
    F.acoes[i]={a:g(`a${i}a`),c:g(`a${i}c`),q:g(`a${i}q`),r:g(`a${i}r`),ind:g(`a${i}i`)};
  });
}

function addAc(){cAc();F.acoes.push({a:"",c:"",q:"",r:"",ind:""});renderPC();}
function rmAc(i){cAc();F.acoes.splice(i,1);renderPC();}
