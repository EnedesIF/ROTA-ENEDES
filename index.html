<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metodologia 4D ENEDES</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --green:#2d6a4f;--green2:#40916c;--gl:#74c69d;--gbg:#f0f9f4;
  --navy:#1d3557;--navy2:#2d4a8a;--amber:#e07a5f;--abg:#fef8f5;
  --purple:#7b2d8b;--blue:#457b9d;
  --bg:#eef2f7;--card:#fff;--border:#dde3ec;--text:#1a2035;--muted:#6b7c93;--soft:#f4f7fb;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ===== LOGIN ===== */
#screen-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 50%,#1a4a35 100%);position:relative;overflow:hidden;}
#screen-login::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 25% 60%,rgba(45,106,79,.2) 0%,transparent 55%),radial-gradient(ellipse at 80% 20%,rgba(29,53,87,.25) 0%,transparent 55%);}
.lbox{background:rgba(255,255,255,.08);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);border-radius:24px;padding:48px 40px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 40px 80px rgba(0,0,0,.35);}
.llo{text-align:center;margin-bottom:28px;}
.llo img{height:64px;width:auto;}
.ltt{font-family:'DM Serif Display',serif;font-size:24px;color:#fff;text-align:center;margin-bottom:4px;}
.lsb{font-size:12px;color:rgba(255,255,255,.5);text-align:center;margin-bottom:32px;}
.lfl{margin-bottom:16px;}
.llb{display:block;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:6px;}
.lin{width:100%;padding:12px 16px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.18);border-radius:10px;font-size:14px;font-family:inherit;color:#fff;outline:none;transition:border-color .2s;}
.lin::placeholder{color:rgba(255,255,255,.3);}
.lin:focus{border-color:var(--gl);box-shadow:0 0 0 3px rgba(116,198,157,.15);}
.lbn{width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--green),#40916c);color:#fff;cursor:pointer;font-family:inherit;font-size:15px;font-weight:700;margin-top:8px;transition:all .2s;letter-spacing:.5px;}
.lbn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(45,106,79,.5);}
.lerr{color:#fca5a5;font-size:13px;text-align:center;margin-top:12px;display:none;background:rgba(252,165,165,.1);border-radius:8px;padding:8px;}

/* ===== HEADER ===== */
.screen{display:none;}
header{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:0 24px;box-shadow:0 2px 20px rgba(0,0,0,.15);position:sticky;top:0;z-index:200;}
.hi{max-width:1200px;margin:0 auto;padding:14px 0;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.hlo{display:flex;align-items:center;gap:12px;}
.hlo img{height:40px;width:auto;}
.ht{color:#fff;font-family:'DM Serif Display',serif;font-size:19px;}
.hs{color:#a8b8d8;font-size:11px;margin-top:1px;}
.hright{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.hbdg{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;border:1px solid;}
.hbdg-coord{background:rgba(224,122,95,.2);border-color:rgba(224,122,95,.4);color:#f0a090;}
.hbdg-consul{background:rgba(116,198,157,.2);border-color:rgba(116,198,157,.4);color:var(--gl);}
.hnav{display:flex;gap:4px;}
.hnav button{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);cursor:pointer;font-family:inherit;font-size:12px;padding:6px 14px;border-radius:8px;transition:all .2s;font-weight:600;}
.hnav button.active{background:rgba(255,255,255,.2);color:#fff;border-color:rgba(255,255,255,.35);}
.hnav button:hover{background:rgba(255,255,255,.15);color:#fff;}
.hout{background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);cursor:pointer;font-family:inherit;font-size:12px;padding:6px 14px;border-radius:8px;transition:all .2s;}
.hout:hover{background:rgba(255,255,255,.1);color:#fff;}

/* ===== MAIN ===== */
.main{max-width:1200px;margin:0 auto;padding:28px 16px;}

/* ===== PHASES (formulário) ===== */
.phases{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:24px;}
.ph{border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .3s;border:2px solid transparent;}
.ph.active{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.13);}
.ph-icon{font-size:22px;margin-bottom:5px;}
.ph-num{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;}
.ph-name{font-size:12px;font-weight:700;}
.ph-dur{font-size:10px;margin-top:2px;opacity:.7;}
.ph0{background:#e8f4f0;color:var(--green);} .ph0.active{background:var(--green);color:#fff;}
.ph1{background:#e8edf8;color:var(--navy);} .ph1.active{background:var(--navy);color:#fff;}
.ph2{background:#f3e8f8;color:var(--purple);} .ph2.active{background:var(--purple);color:#fff;}
.ph3{background:#fdecea;color:var(--amber);} .ph3.active{background:var(--amber);color:#fff;}

/* ===== CARD ===== */
.card{background:var(--card);border-radius:16px;padding:28px;border:1px solid var(--border);box-shadow:0 2px 16px rgba(0,0,0,.05);margin-bottom:20px;animation:fi .3s ease;}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.ph-hdr{display:flex;align-items:flex-start;gap:16px;margin-bottom:22px;padding-bottom:18px;border-bottom:2px solid var(--bg);}
.ph-ico{width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.ph-lbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;}
.ph-ttl{font-family:'DM Serif Display',serif;font-size:21px;margin-bottom:3px;}
.ph-obj{font-size:13px;color:var(--muted);line-height:1.5;}
.ph-dur2{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:5px;}

/* ===== FIELDS ===== */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.full{grid-column:1/-1;}
.fg{margin-bottom:15px;}
.lbl{display:block;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
input[type=text],input[type=date],select,textarea{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:inherit;background:var(--soft);color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;}
input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(45,106,79,.1);}
select{appearance:none;cursor:pointer;}
textarea{resize:vertical;line-height:1.6;}
.rg,.cg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px;}
.ri,.ci{display:flex;align-items:center;gap:10px;cursor:pointer;padding:9px 12px;border-radius:8px;font-size:14px;color:var(--text);background:var(--soft);border:1.5px solid var(--border);transition:all .2s;}
.ri:hover,.ci:hover{border-color:var(--green);background:var(--gbg);}
.ri input,.ci input{width:16px;height:16px;accent-color:var(--green);cursor:pointer;flex-shrink:0;}

/* ===== PILARES ===== */
.pg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px;}
.pilar{background:var(--soft);border:1.5px solid var(--border);border-radius:12px;padding:14px;}
.pilar-n{font-weight:700;font-size:13px;color:var(--navy);margin-bottom:8px;}
.stars{display:flex;gap:5px;margin-bottom:8px;}
.star{width:32px;height:32px;border-radius:6px;border:1.5px solid var(--border);cursor:pointer;font-weight:700;font-size:13px;font-family:inherit;background:#fff;color:var(--muted);transition:all .15s;}
.star.on{background:var(--purple);border-color:var(--purple);color:#fff;}
.cls{display:flex;gap:4px;margin-bottom:8px;}
.clb{flex:1;padding:5px 2px;border-radius:6px;border:1.5px solid var(--border);cursor:pointer;font-size:9px;font-weight:700;font-family:inherit;background:#fff;color:var(--muted);transition:all .15s;text-align:center;}
.cu.on{background:#e53e3e;border-color:#e53e3e;color:#fff;}
.ci2.on{background:#dd6b20;border-color:#dd6b20;color:#fff;}
.ce.on{background:var(--green);border-color:var(--green);color:#fff;}
.pobs{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-family:inherit;background:#fff;color:var(--text);outline:none;resize:vertical;}

/* ===== GUT ===== */
.gut{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px;}
.gut-i{background:var(--soft);border:1.5px solid var(--border);border-radius:10px;padding:12px;}
.gut-l{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.gut-d{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.4;}
.gut-s{display:flex;gap:4px;}
.gs{width:28px;height:28px;border-radius:5px;border:1.5px solid var(--border);cursor:pointer;font-weight:700;font-size:12px;font-family:inherit;background:#fff;color:var(--muted);transition:all .15s;}
.gs.on{background:var(--navy);border-color:var(--navy);color:#fff;}
.gut-t{background:#e8edf8;border:1.5px solid var(--navy);border-radius:10px;padding:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.gut-tv{font-family:'DM Serif Display',serif;font-size:32px;color:var(--navy);}
.gut-tl{font-size:11px;color:var(--navy);font-weight:700;opacity:.7;}

/* ===== AÇÕES ===== */
.ac{background:var(--abg);border:1.5px solid #f0d5c8;border-radius:12px;padding:16px;margin-bottom:10px;}
.ac-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.ac-l{font-size:11px;font-weight:700;color:var(--amber);letter-spacing:1.5px;text-transform:uppercase;}
.ac-r{background:none;border:none;color:#a0aec0;cursor:pointer;font-size:18px;padding:0;line-height:1;}
.ac-g{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ac-f{grid-column:1/-1;}
.afl{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.ai{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;background:#fff;color:var(--text);outline:none;}
.ai:focus{border-color:var(--amber);}
.add-ac{width:100%;padding:11px;border:1.5px dashed var(--green);border-radius:9px;background:transparent;color:var(--green);cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;transition:background .2s;}
.add-ac:hover{background:var(--gbg);}

/* ===== NPS ===== */
.nps-r{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.nb{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;font-weight:700;font-size:13px;font-family:inherit;background:var(--soft);color:var(--muted);transition:all .15s;}
.nb.on{background:var(--green);border-color:var(--green);color:#fff;}
.nps-lb{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px;}

/* ===== NAV FORM ===== */
.nav{display:flex;justify-content:space-between;align-items:center;}
.bk{padding:10px 24px;border-radius:9px;border:1.5px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;font-family:inherit;font-size:14px;}
.bk:hover{background:var(--bg);}
.bn{padding:10px 28px;border-radius:9px;border:none;color:#fff;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;transition:all .2s;}
.bn:hover{opacity:.9;}
.bs{padding:11px 32px;border-radius:9px;border:none;background:var(--green);color:#fff;cursor:pointer;font-family:inherit;font-size:15px;font-weight:700;}
.bs.ok{background:#27ae60;}
.prog{display:flex;gap:6px;margin-top:16px;}
.pb{height:4px;flex:1;border-radius:4px;background:var(--border);transition:background .3s;}

/* ===== ALERTS ===== */
.aerr{margin-top:12px;color:#e53e3e;font-size:13px;background:#fff5f5;border:1px solid #fed7d7;border-radius:8px;padding:10px 14px;}
.aok{margin-top:12px;color:var(--green);font-size:13px;background:var(--gbg);border:1px solid #b7e4c7;border-radius:8px;padding:10px 14px;}
.ainfo{background:#fffbea;border:1px solid #f6e05e;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#744210;}
.apos{background:var(--gbg);border:1px solid #b7e4c7;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--green);}
.tip{font-size:12px;color:var(--muted);background:var(--soft);border:1px solid var(--border);border-radius:8px;padding:9px 13px;margin-bottom:14px;line-height:1.5;}
.tip strong{color:var(--text);}
.sep{border-top:2px solid var(--bg);margin:20px 0 16px;}

/* ===== LISTA ===== */
.lh{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.lt{font-family:'DM Serif Display',serif;font-size:24px;color:var(--navy);}
.sts{display:flex;gap:10px;flex-wrap:wrap;}
.st{background:#fff;border:1px solid var(--border);border-radius:10px;padding:8px 14px;text-align:center;}
.stv{font-family:'DM Serif Display',serif;font-size:22px;color:var(--navy);}
.stl{font-size:11px;color:var(--muted);font-weight:600;}
.rec{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px 20px;cursor:pointer;margin-bottom:10px;transition:all .2s;}
.rec:hover{box-shadow:0 6px 24px rgba(45,106,79,.12);transform:translateY(-2px);}
.rec-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.rec-nm{font-weight:700;font-size:16px;margin-bottom:2px;}
.rec-sb{font-size:13px;color:var(--muted);}
.rec-tg{display:flex;gap:6px;flex-wrap:wrap;}
.tg{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.tgg{background:var(--gbg);color:var(--green);}
.tgn{background:#e8edf8;color:var(--navy);}
.tgp{background:#f3e8f8;color:var(--purple);}
.tga{background:var(--abg);color:var(--amber);}
.rec-mt{font-size:12px;color:#a0aec0;margin-top:6px;}

/* ===== DETALHE ===== */
.db{background:none;border:none;color:var(--green);cursor:pointer;font-family:inherit;font-size:14px;margin-bottom:16px;padding:0;font-weight:700;}
.dn{font-family:'DM Serif Display',serif;font-size:26px;margin-bottom:4px;}
.dm{color:var(--muted);font-size:13px;margin-bottom:24px;}
.ds{margin-bottom:22px;}
.dst{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:8px 14px;border-radius:8px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.dr{margin-bottom:10px;}
.dl{font-size:11px;color:#a0aec0;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px;}
.dv{font-size:14px;color:var(--text);line-height:1.6;}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.pd{background:var(--soft);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.pdn{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px;}
.pdv{font-family:'DM Serif Display',serif;font-size:24px;color:var(--purple);}
.sg{background:var(--gbg);color:var(--green);}
.sn{background:#e8edf8;color:var(--navy);}
.sp2{background:#f3e8f8;color:var(--purple);}
.sa{background:var(--abg);color:var(--amber);}

/* ===== DASHBOARD COORD ===== */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;}
.kpi:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.08);}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:16px 16px 0 0;}
.kpi.k0::after{background:linear-gradient(90deg,var(--green),var(--gl));}
.kpi.k1::after{background:linear-gradient(90deg,var(--navy),var(--blue));}
.kpi.k2::after{background:linear-gradient(90deg,var(--purple),#b06bc0);}
.kpi.k3::after{background:linear-gradient(90deg,var(--amber),#f0a090);}
.ki{font-size:30px;margin-bottom:10px;}
.kv{font-family:'DM Serif Display',serif;font-size:38px;color:var(--text);line-height:1;margin-bottom:4px;}
.kl{font-size:12px;color:var(--muted);font-weight:600;}
.ks{font-size:11px;color:var(--muted);margin-top:4px;}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;}
.cfull{grid-column:1/-1;}
.cc{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;box-shadow:0 2px 12px rgba(0,0,0,.04);}
.ct{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px;}
.cst{font-size:11px;color:var(--muted);margin-bottom:18px;}
.cw{position:relative;height:220px;}
.cwt{height:280px;}
.tc{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:24px;box-shadow:0 2px 12px rgba(0,0,0,.04);}
.th{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.tt{font-size:13px;font-weight:700;color:var(--text);}
.sb{background:var(--soft);border:1.5px solid var(--border);border-radius:9px;padding:8px 14px;font-size:13px;font-family:inherit;color:var(--text);outline:none;width:240px;}
.sb::placeholder{color:var(--muted);}
.sb:focus{border-color:var(--green);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{text-align:left;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:8px 12px;border-bottom:2px solid var(--border);}
tbody td{padding:10px 12px;border-bottom:1px solid var(--soft);color:var(--text);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:#fafcff;}

/* ===== UTILS ===== */
.ld{text-align:center;padding:60px;color:var(--muted);}
.spin{display:inline-block;width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{background:#fff;border-radius:16px;padding:48px;text-align:center;border:1px solid var(--border);color:var(--muted);}

@media(max-width:768px){
  .kpis,.cgrid{grid-template-columns:1fr 1fr;}
  .cfull{grid-column:auto;}
  .g2,.rg,.cg,.pg,.gut,.ac-g,.dg{grid-template-columns:1fr;}
  .full,.ac-f{grid-column:auto;}
  .phases{grid-template-columns:1fr 1fr;}
}
@media(max-width:480px){.kpis{grid-template-columns:1fr;}}
</style>
</head>

function doLogin(){
  const u=document.getElementById('lu').value.trim().toLowerCase();
  const p=document.getElementById('lp').value.trim();
  if(u==='coordenador'&&p==='enedes2025'){
    PERFIL='coord'; USER_NAME='Coordenador';
    startApp();
  } else if(p==='rota2025'){
    // qualquer usuário com senha consultor

    startApp();
  } else {
    document.getElementById('le').style.display='block';
  }

function startApp(){
  // Garantir que F.mentor seja o nome do consultor logado
  if(PERFIL==='consul') F.mentor = USER_NAME;
  document.getElementById('screen-login').style.display='none';

}

function doLogout(){

function setActiveNav(v){
  document.querySelectorAll('.hnav button').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('nav-'+v);
  if(el) el.classList.add('active');
}

function showView(v){
  currentView=v;
  setActiveNav(v);
  const el=document.getElementById('app-main');
  el.innerHTML='<div class="ld"><div class="spin"></div><br>Carregando...</div>';

}

// ========== SUPABASE ==========
async function loadData(){
  const r=await fetch(SU+'/rest/v1/ATENDIMENTOS?select=*&order=created_at.desc&limit=1000',{
    headers:{'apikey':SK,'Authorization':'Bearer '+SK}
  });
  ALL=await r.json();
  return ALL;
}

async function saveData(rec){
  await fetch(SU+'/rest/v1/ATENDIMENTOS',{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SK,'Authorization':'Bearer '+SK,'Prefer':'return=minimal'},
    body:JSON.stringify(rec)
  });
}

// ========== LISTA ==========
async function loadAndRenderLista(){
  try{
    await loadData();
    let data = PERFIL==='consul' ? ALL.filter(r=>r.mentor&&r.mentor.toLowerCase().trim()===USER_NAME.toLowerCase().trim()) : ALL;
    const nps=data.filter(d=>d.nps).map(d=>+d.nps);
    const avgN=nps.length?(nps.reduce((a,b)=>a+b,0)/nps.length).toFixed(1):'—';
    document.getElementById('app-main').innerHTML=`
      <div class="lh">
        <div class="lt">${PERFIL==='coord'?'Todos os Atendimentos':'Meus Atendimentos'}</div>
        <div class="sts">
          <div class="st"><div class="stv">${data.length}</div><div class="stl">Total</div></div>
          <div class="st"><div class="stv">${avgN}</div><div class="stl">NPS Médio</div></div>
        </div>
      </div>
      ${PERFIL==='consul'?`<div class="ainfo">💡 Mostrando atendimentos registrados por <strong>${USER_NAME}</strong>.</div>`:'<div class="ainfo">📊 Todos os atendimentos de todos os consultores.</div>'}
      ${data.length===0?`<div class="empty"><div style="font-size:48px;margin-bottom:12px">🚀</div><div style="font-size:16px;font-weight:600">Nenhum atendimento ainda</div></div>`
      :data.map((r,i)=>{
        const ns=PILS.map(p=>+r['pilar_'+p.k.toLowerCase().replace('/','_').replace(' ','_')+'_nota']||0).filter(Boolean);
        const pa=ns.length?(ns.reduce((a,b)=>a+b,0)/ns.length).toFixed(1):null;
        return `<div class="rec" onclick="openDetalhe(${i},this.dataset.orig)" data-i="${ALL.indexOf(r)}">
          <div class="rec-top">
            <div><div class="rec-nm">${e(r.nome)||'—'}</div><div class="rec-sb">${[r.negocio,r.segmento].filter(Boolean).join(' · ')}</div></div>
            <div class="rec-tg">
              ${pa?`<span class="tg tgp">⭐ ${pa}/5</span>`:''}
              ${r.nps?`<span class="tg tgn">NPS ${r.nps}</span>`:''}
              <span class="tg tgg">${r.data_mentoria||r.saved_at?.split(',')[0]||''}</span>
            </div>
          </div>
          <div class="rec-mt">Mentor: ${r.mentor||'—'} · ${r.area||''} · Campus ${r.campus||'—'} · ${r.formato||''}</div>
        </div>`;
      }).join('')}`;
  }catch(e){document.getElementById('app-main').innerHTML='<div class="empty">Erro ao carregar.</div>';}
}

function openDetalhe(i, orig){
  // i é índice na lista filtrada, buscar no ALL
  const el=document.querySelectorAll('.rec')[i];
  const idx=el?parseInt(el.dataset.i):i;
  selRec=ALL[idx]||ALL[i];
  showView('detalhe');
}

// ========== DETALHE ==========
function renderDetalhe(){
  const r=selRec; if(!r)return;
  const row=(l,v)=>v?`<div class="dr"><div class="dl">${l}</div><div class="dv">${e(String(v))}</div></div>`:'';
  const sec=(t,c,h)=>`<div class="ds"><div class="dst s${c}">${t}</div>${h}</div>`;
  const gut=r.gut||{};
  const gt=(+r.gut_g||0)*(+r.gut_u||0)*(+r.gut_t||0);
  document.getElementById('app-main').innerHTML=`
    <button class="db" onclick="showView('lista')">← Voltar</button>
    <div class="card">
      <div class="dn">${e(r.nome)}</div>
      <div class="dm">${[r.negocio,r.segmento].filter(Boolean).join(' · ')} · Mentor: ${r.mentor||'—'} · ${r.saved_at||''}</div>
      ${sec("📋 Identificação","g",`<div class="g2">
        ${row("Segmento",r.segmento)}${row("Telefone",r.telefone)}${row("E-mail",r.email)}${row("Estágio",r.estagio)}${row("Formato",r.formato)}
        ${row("CNPJ",r.cnpj)}${row("Data",r.data_mentoria)}${row("Mentor",r.mentor)}
        ${row("Área",r.area)}${row("Campus",r.campus)}
      </div>`)}
      ${sec("🔎 Fase 1 — Diagnosticar","g",`
        ${row("Desafios",[r.desafios,r.desafio_outro].filter(Boolean).join(', '))}
        <div class="dg" style="margin-top:8px">
          ${PILS.map(p=>{
            const base=p.k.toLowerCase().replace('/','_').replace(' ','_');
            const n=r['pilar_'+base+'_nota'],c=r['pilar_'+base+'_classe'],o=r['pilar_'+base+'_obs'];
            return n?`<div class="pd"><div class="pdn">${p.i} ${p.k}</div><div class="pdv">${n}<span style="font-size:14px;color:#a0aec0">/5</span></div>
              ${c?`<div style="font-size:10px;font-weight:700;color:${c==='urgente'?'#e53e3e':c==='importante'?'#dd6b20':'#2d6a4f'};margin-top:2px">${c.toUpperCase()}</div>`:''}
              ${o?`<div style="font-size:12px;color:#6b7c93;margin-top:4px">${e(o)}</div>`:''}</div>`:'';
          }).join('')}
        </div>
      `)}
      ${sec("🎯 Fase 2 — Direcionar","n",`
        ${gt?row("Matriz GUT",`G(${r.gut_g}) × U(${r.gut_u}) × T(${r.gut_t}) = <strong>${gt}</strong>`):''}
        ${row("Problema central",r.problema)}${row("Causa principal",r.causa)}
        ${row("5 Porquês",r.cinco_p)}${row("Meta SMART",r.meta_smart)}
        ${row("KPI",r.kpi)}${row("Prazo",r.prazo)}
      `)}
      ${sec("🛠 Fase 3 — Desenvolver","p",`
        ${[r.acao1,r.acao2,r.acao3].filter(Boolean).map((a,i)=>`<div style="background:#f3e8f8;border:1px solid #e9c8f0;border-radius:9px;padding:12px;margin-bottom:8px"><div style="font-size:11px;font-weight:700;color:#7b2d8b;margin-bottom:4px">AÇÃO ${i+1}</div><div style="font-size:14px">${e(a)}</div></div>`).join('')}
        ${row("Compromissos",r.compromissos)}${row("Observações",r.observacoes)}
      `)}
      ${sec("📊 Fase 4 — Resultados","a",`
        ${row("Data retorno",r.data_retorno)}${row("O que foi implementado?",r.implementado)}
        ${row("O que funcionou?",r.funcionou)}${row("O que ajustar?",r.ajustes)}
        ${row("Próximos passos",r.proximos_passos)}
        ${r.nps?`<div class="dr"><div class="dl">NPS</div><div class="dv" style="font-family:'DM Serif Display',serif;font-size:28px;color:#2d6a4f">${r.nps}/10${r.comentario_nps?` — <span style="font-size:14px">${e(r.comentario_nps)}</span>`:''}</div></div>`:''}
      `)}
    </div>`;
}

function renderForm(){

function rPB(){

function rPrg(){

  document.getElementById('prg').innerHTML=PH.map((_,i)=>`<div class="pb" style="background:${i<=cp?cs[i]:'#dde3ec'}"></div>`).join('');
}

function rNav(){
  const bk=document.getElementById('bbk'),nt=document.getElementById('bnt');
  const cs=["#2d6a4f","#1d3557","#7b2d8b","#e07a5f"];
  bk.textContent=cp===0?'Cancelar':'← Fase anterior';
  bk.onclick=()=>{if(cp===0)showView('lista');else{cp--;renderForm();}};
  if(cp<3){nt.textContent=`Próxima fase → ${PH[cp+1].icon}`;nt.style.background=cs[cp+1];nt.className='bn';nt.onclick=nxt;}
  else{nt.textContent='Salvar Mentoria ✓';nt.style.background='#2d6a4f';nt.className='bs';nt.onclick=salvar;}

function rPC(){
  const el=document.getElementById('ph-c');

      <div class="nps-r">${Array.from({length:11},(_,i)=>`<button class="nb ${F.nps===String(i)?'on':''}" onclick="sn(${i})" type="button">${i}</button>`).join('')}</div>
      <div class="nps-lb"><span>0 = Não recomendaria</span><span>10 = Com certeza</span></div>
    </div>
    ${F.nps!==''?`<div class="fg"><label class="lbl">Comentário</label><input type="text" id="p5" value="${e(F.cnps)}" placeholder="O que poderia melhorar?"></div>`:''}`;
}

function rAc(a,i){
  return `<div class="ac" id="ac${i}">
    <div class="ac-h"><span class="ac-l">Ação ${i+1}</span>${F.acoes.length>1?`<button class="ac-r" onclick="rmAc(${i})" type="button">✕</button>`:''}</div>
    <div class="ac-g">
      <div class="ac-f"><div class="afl">O que será feito</div><input class="ai" id="a${i}a" value="${e(a.a)}" placeholder="Descreva..."></div>
      <div><div class="afl">Como</div><input class="ai" id="a${i}c" value="${e(a.c)}" placeholder="Método..."></div>
      <div><div class="afl">Quando</div><input class="ai" id="a${i}q" value="${e(a.q)}" placeholder="Ex: 15 dias"></div>
      <div><div class="afl">Responsável</div><input class="ai" id="a${i}r" value="${e(a.r)}" placeholder="Quem?"></div>
      <div><div class="afl">Indicador</div><input class="ai" id="a${i}i" value="${e(a.ind)}" placeholder="Como medir?"></div>
    </div>
  </div>`;
}

function bindP(){
  const b=(id,fn)=>{const el=document.getElementById(id);if(el)el.addEventListener('input',ev=>fn(ev.target.value));};
  if(cp===0){
    b('f0',v=>F.nome=v);b('f1',v=>F.negocio=v);b('ftel',v=>F.telefone=v);b('femail',v=>F.email=v);b('f2',v=>F.cnpj=v);b('f3',v=>F.seg=v);
    b('f4',v=>F.data=v);b('f5',v=>F.mentor=v);b('f6',v=>F.desaOutro=v);b('f7',v=>F.area=v);b('f8',v=>F.campus=v);
    q('[name=fmt]').forEach(r=>r.addEventListener('change',ev=>F.fmt=ev.target.value));
    q('[name=est]').forEach(r=>r.addEventListener('change',ev=>F.est=ev.target.value));
    q('.dc').forEach(c=>c.addEventListener('change',ev=>{
      if(ev.target.checked){if(!F.desa.includes(ev.target.value))F.desa.push(ev.target.value);}
      else F.desa=F.desa.filter(d=>d!==ev.target.value);
    }));
    PILS.forEach(p=>{const o=document.getElementById(`po-${p.k.replace(/\//g,'-')}`);if(o)o.addEventListener('input',ev=>F.pils[p.k].o=ev.target.value);});
  }
  if(cp===1){b('g0',v=>F.prob=v);b('g1',v=>F.causa=v);b('g2',v=>F.cincoP=v);b('g3',v=>F.meta=v);b('g4',v=>F.kpi=v);b('g5',v=>F.prazo=v);}
  if(cp===2){
    bAc();
    q('.cc').forEach(c=>c.addEventListener('change',ev=>{
      if(ev.target.checked){if(!F.comps.includes(ev.target.value))F.comps.push(ev.target.value);}
      else F.comps=F.comps.filter(x=>x!==ev.target.value);
    }));
    b('p2o',v=>F.obs=v);
  }
  if(cp===3){b('p0',v=>F.retorno=v);b('p1',v=>F.impl=v);b('p2',v=>F.func=v);b('p3',v=>F.ajus=v);b('p4',v=>F.prox=v);b('p5',v=>F.cnps=v);}
}

function bAc(){F.acoes.forEach((_,i)=>{const b=(id,key)=>{const el=document.getElementById(id);if(el)el.addEventListener('input',ev=>F.acoes[i][key]=ev.target.value);};b(`a${i}a`,'a');b(`a${i}c`,'c');b(`a${i}q`,'q');b(`a${i}r`,'r');b(`a${i}i`,'ind');});}
function cAc(){F.acoes.forEach((_,i)=>{const g=id=>{const el=document.getElementById(id);return el?el.value:''};F.acoes[i]={a:g(`a${i}a`),c:g(`a${i}c`),q:g(`a${i}q`),r:g(`a${i}r`),ind:g(`a${i}i`)};
});}
function addAc(){cAc();F.acoes.push({a:'',c:'',q:'',r:'',ind:''});rPC();}
function rmAc(i){cAc();F.acoes.splice(i,1);rPC();}
function sp(k,key,v){F.pils[k][key]=v;rPC();}
function sg(k,v){F.gut[k]=v;rPC();}
function sn(n){F.nps=String(n);rPC();}

function nxt(){
  if(cp===0&&!F.nome.trim()){sa('e','⚠️ Informe o nome do empreendedor.');return;}
  ha();cp++;renderForm();
}

async function salvar(){
  if(!F.nome.trim()){sa('e','⚠️ Informe o nome do empreendedor.');return;}
  const btn=document.getElementById('bnt');
  btn.textContent='Salvando...';btn.disabled=true;
  const rec={
    saved_at:new Date().toLocaleString('pt-BR'),
    nome:F.nome,negocio:F.negocio,telefone:F.telefone,email:F.email,cnpj:F.cnpj,segmento:F.seg,
    data_mentoria:F.data,formato:F.fmt,mentor:(F.mentor||USER_NAME),area:F.area,campus:F.campus,
    estagio:F.est,desafios:F.desa.join(', '),desafio_outro:F.desaOutro,
    pilar_produto_nota:F.pils['Produto/Serviço'].n,pilar_produto_classe:F.pils['Produto/Serviço'].c,pilar_produto_obs:F.pils['Produto/Serviço'].o,
    pilar_vendas_nota:F.pils['Vendas/Marketing'].n,pilar_vendas_classe:F.pils['Vendas/Marketing'].c,pilar_vendas_obs:F.pils['Vendas/Marketing'].o,
    pilar_financas_nota:F.pils['Finanças'].n,pilar_financas_classe:F.pils['Finanças'].c,pilar_financas_obs:F.pils['Finanças'].o,
    pilar_gestao_nota:F.pils['Gestão/Processos'].n,pilar_gestao_classe:F.pils['Gestão/Processos'].c,pilar_gestao_obs:F.pils['Gestão/Processos'].o,
    gut_g:F.gut.G,gut_u:F.gut.U,gut_t:F.gut.T,
    problema:F.prob,causa:F.causa,cinco_p:F.cincoP,meta_smart:F.meta,kpi:F.kpi,prazo:F.prazo,
    acao1:F.acoes[0]?.a||'',acao2:F.acoes[1]?.a||'',acao3:F.acoes[2]?.a||'',
    compromissos:F.comps.join('; '),observacoes:F.obs,
    data_retorno:F.retorno,implementado:F.impl,funcionou:F.func,
    ajustes:F.ajus,proximos_passos:F.prox,nps:F.nps,comentario_nps:F.cnps
  };
  try{
    await saveData(rec);
    btn.textContent='✓ Salvo!';btn.className='bs ok';
    sa('o','✅ Atendimento salvo no banco de dados!');
    setTimeout(()=>showView('lista'),2000);
  }catch(err){
    btn.textContent='Salvar Mentoria ✓';btn.disabled=false;
    sa('e','❌ Erro ao salvar. Tente novamente.');
  }
}

// ========== CHARTS ==========
const ax={grid:{color:'rgba(221,227,236,.6)'},ticks:{color:'#6b7c93',font:{family:'Sora',size:11}}};
function donut(id,obj,cols){const k=Object.keys(obj),v=Object.values(obj);if(!k.length)return;new Chart(document.getElementById(id),{type:'doughnut',data:{labels:k,datasets:[{data:v,backgroundColor:cols,borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#6b7c93',font:{family:'Sora',size:10},boxWidth:12,padding:8}}}}});}
function barChart(id,obj,col){const k=Object.keys(obj).slice(0,12),v=k.map(x=>obj[x]);if(!k.length)return;new Chart(document.getElementById(id),{type:'bar',data:{labels:k,datasets:[{data:v,backgroundColor:col+'99',borderColor:col,borderWidth:1.5,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{...ax,grid:{display:false}},y:{...ax}}}});}
function barH(id,obj,col){const s=Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,10);if(!s.length)return;new Chart(document.getElementById(id),{type:'bar',data:{labels:s.map(x=>x[0]),datasets:[{data:s.map(x=>x[1]),backgroundColor:col+'88',borderColor:col,borderWidth:1.5,borderRadius:6}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{...ax},y:{...ax,grid:{display:false}}}}});}
function radarChart(id,obj){const k=Object.keys(obj),v=Object.values(obj);new Chart(document.getElementById(id),{type:'radar',data:{labels:k,datasets:[{data:v,backgroundColor:'rgba(45,106,79,.15)',borderColor:'#40916c',pointBackgroundColor:'#40916c',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,scales:{r:{min:0,max:5,ticks:{stepSize:1,color:'#6b7c93',backdropColor:'transparent',font:{family:'Sora',size:10}},grid:{color:'rgba(221,227,236,.8)'},pointLabels:{color:'#1a2035',font:{family:'Sora',size:11}},angleLines:{color:'rgba(221,227,236,.8)'}}},plugins:{legend:{display:false}}}});}

// ========== TABLE COORD ==========
function renderTbl(data){
  const el=document.getElementById('tbl-body');
  if(!data.length){el.innerHTML='<div style="text-align:center;padding:32px;color:var(--muted)">Nenhum registro.</div>';return;}
  el.innerHTML=`<table><thead><tr><th>Empreendedor</th><th>Negócio</th><th>Consultor</th><th>Campus</th><th>Segmento</th><th>Estágio</th><th>NPS</th><th>Data</th></tr></thead><tbody>
    ${data.map(r=>`<tr>
      <td><strong>${r.nome||'—'}</strong></td><td>${r.negocio||'—'}</td><td>${r.mentor||'—'}</td>
      <td><span class="tg tgn">${r.campus||'—'}</span></td>
      <td><span class="tg tgg">${r.segmento||'—'}</span></td>
      <td>${r.estagio||'—'}</td>
      <td>${r.nps?`<span class="tg ${+r.nps>=9?'tgg':+r.nps>=7?'tga':'tga'}">${r.nps}/10</span>`:'—'}</td>
      <td style="color:var(--muted);font-size:12px">${r.data_mentoria||r.saved_at?.split(',')[0]||'—'}</td>
    </tr>`).join('')}
  </tbody></table>`;
}
function filterTbl(q){renderTbl(q?ALL.filter(r=>JSON.stringify(r).toLowerCase().includes(q.toLowerCase())):ALL);}

// ========== UTILS ==========
function q(s){return Array.from(document.querySelectorAll(s));}
function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
function sa(t,m){ha();const el=document.getElementById('a'+t);if(el){el.textContent=m;el.style.display='block';}}
function ha(){['e','o'].forEach(t=>{const el=document.getElementById('a'+t);if(el)el.style.display='none';});}
function cnt(data,k){return data.reduce((a,r)=>{const v=r[k];if(v)a[v]=(a[v]||0)+1;return a;},{});}
function avgF(data,k){const v=data.map(r=>+r[k]).filter(n=>n>0);return v.length?+(v.reduce((a,b)=>a+b,0)/v.length).toFixed(1):0;}
function cntDesafios(data){const a={};data.forEach(r=>{if(r.desafios)r.desafios.split(',').forEach(d=>{const t=d.trim();if(t)a[t]=(a[t]||0)+1;});});return a;}
</script>
